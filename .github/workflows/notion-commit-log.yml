name: Log Commits → Notion

on:
  push:
    branches: [main]
  create:
  delete:

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Build log entry (push)
        if: github.event_name == 'push'
        id: entry_push
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          AUTHOR="${{ github.actor }}"
          COMMITS_COUNT=$(echo '${{ toJson(github.event.commits) }}' | python3 -c "import sys,json; cs=json.load(sys.stdin); print(len(cs))" 2>/dev/null || echo "1")
          LAST_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | tr -d '"\' | head -c 200)
          BRANCH="${{ github.ref_name }}"
          TEXT="${DATE} | Commit | [${SHORT_SHA}] ${LAST_MSG} (${AUTHOR}, branch: ${BRANCH}, всего коммитов: ${COMMITS_COUNT})"
          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build log entry (branch created)
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        id: entry_create
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BRANCH="${{ github.event.ref }}"
          AUTHOR="${{ github.actor }}"
          TEXT="${DATE} | Branch | Создана ветка: ${BRANCH} (${AUTHOR})"
          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/tree/${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build log entry (branch deleted)
        if: github.event_name == 'delete' && github.event.ref_type == 'branch'
        id: entry_delete
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BRANCH="${{ github.event.ref }}"
          AUTHOR="${{ github.actor }}"
          TEXT="${DATE} | Branch | Удалена ветка: ${BRANCH} (${AUTHOR})"
          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}" >> $GITHUB_OUTPUT

      - name: Resolve log text
        id: log
        run: |
          TEXT="${{ steps.entry_push.outputs.text }}${{ steps.entry_create.outputs.text }}${{ steps.entry_delete.outputs.text }}"
          URL="${{ steps.entry_push.outputs.url }}${{ steps.entry_create.outputs.url }}${{ steps.entry_delete.outputs.url }}"
          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Append to Notion log page
        run: |
          TEXT="${{ steps.log.outputs.text }}"
          URL="${{ steps.log.outputs.url }}"
          curl -s -X PATCH "https://api.notion.com/v1/blocks/${{ secrets.NOTION_LOG_PAGE_ID }}/children" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{
              \"children\": [
                {
                  \"object\": \"block\",
                  \"type\": \"to_do\",
                  \"to_do\": {
                    \"rich_text\": [
                      {
                        \"type\": \"text\",
                        \"text\": { \"content\": \"${TEXT} \", \"link\": null }
                      },
                      {
                        \"type\": \"text\",
                        \"text\": { \"content\": \"→ открыть\", \"link\": { \"url\": \"${URL}\" } },
                        \"annotations\": { \"color\": \"blue\" }
                      }
                    ],
                    \"checked\": true
                  }
                }
              ]
            }"
